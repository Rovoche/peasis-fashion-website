<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PEASIS — Under Maintenance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    height:100vh;
    background: radial-gradient(circle at center, #0d0d0d 0%, #000 100%);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family: 'Cormorant Garamond', Georgia, serif;
    color:#f3e9d8;
    overflow:hidden;
  }
  .container {
    text-align:center;
    padding:40px;
    animation: fadeIn 1.5s ease-out;
  }
  h1 {
    font-size: 3rem;
    letter-spacing: 4px;
    color:#e8d3a0;
    text-shadow: 0 0 20px rgba(232,211,160,0.4);
    margin-bottom: 10px;
  }
  .sub {
    font-family: 'Jost', sans-serif;
    font-size: 1rem;
    letter-spacing: 2px;
    color:#cfc3a8;
    margin-bottom: 30px;
  }
  .loader {
    width: 60px;
    height: 60px;
    margin: 0 auto 30px;
    border: 2px solid rgba(232,211,160,0.2);
    border-top: 2px solid #e8d3a0;
    border-radius: 50%;
    animation: spin 1.2s linear infinite;
  }
  .msg {
    font-family: 'Jost', sans-serif;
    font-size: 0.95rem;
    color:#a99c80;
    max-width: 420px;
    margin: 0 auto;
    line-height: 1.6;
  }
  .signature {
    margin-top: 50px;
    font-family: 'Jost', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 3px;
    color: #8a7d63;
    text-transform: uppercase;
  }
  .signature span { color:#e8d3a0; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
</style>
</head>
<body>
  <div class="container">
    <div class="loader"></div>
    <h1>PEASIS</h1>
    <div class="sub">Style. Image. Stun.</div>
    <p class="msg">
      We're currently refining the PEASIS experience.<br>
      Our site is being updated by ROVOCHÉ and will be back online very soon.
      Thank you for your patience.
    </p>
    <div class="signature">Built on Rock. <span>ROVOCHÉ</span></div>
  </div>
</body>
</html>
